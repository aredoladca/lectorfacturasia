<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alexander IA</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background: #f5f7f8;
            font-family: Arial, sans-serif;
            overflow-x: auto;
        }

        .container {
            width: 100%;
            background: #fff;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            border-bottom: 3px solid #111;
            padding-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 48px;
            line-height: 1;
        }

        .tag {
            display: inline-block;
            margin-top: 10px;
            background: #111;
            color: #00ffd0;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
        }

        .controls,
        .tools,
        .actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        input {
            width: 500px;
            max-width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .audit {
            background: #111;
            color: #fff;
            padding: 14px 18px;
        }

        .ok,
        .save {
            color: #fff;
            padding: 10px 12px;
            font-size: 12px;
            min-width: 78px;
        }

        .ok {
            background: #2ecc71;
        }

        .save {
            background: #f39c12;
        }

        .delete {
            background: none;
            color: #bbb;
            font-size: 24px;
            padding: 0 8px;
        }

        .eye {
            font-size: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #f3f3f3;
            transition: .2s;
        }

        .eye:hover {
            background: #111;
            color: #fff;
            transform: scale(1.05);
        }

        #loader {
            display: none;
            background: #111;
            color: #00ffd0;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 1200px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            text-align: left;
            padding: 14px 10px;
            font-size: 12px;
            color: #666;
            border-bottom: 2px solid #eee;
            text-transform: uppercase;
        }

        td {
            padding: 18px 10px;
            border-bottom: 1px solid #f1f1f1;
            vertical-align: middle;
        }

        .right {
            text-align: right;
        }

        .center {
            text-align: center;
        }

        .big {
            font-size: 18px;
            font-weight: bold;
            word-break: break-word;
        }

        .money {
            font-size: 18px;
            font-family: monospace;
            font-weight: bold;
            white-space: nowrap;
        }

        .review {
            display: inline-block;
            margin-top: 8px;
            background: #fff3cd;
            color: #9a6a00;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }

        [contenteditable="true"] {
            display: block;
            padding: 4px;
            border-radius: 4px;
        }

        [contenteditable="true"]:focus {
            outline: 2px solid #00ffd0;
            background: #eafffb;
        }

        @media (max-width: 900px) {
            h1 {
                font-size: 36px;
            }

            .money,
            .big {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="top">
            <div>
                <h1>Alexander IA</h1>
                <div class="tag">FACTURAS | MEMORIA URL + ID</div>
            </div>

            <div class="controls">
                <input id="urlInput" type="text" placeholder="Pega aquí la URL del PDF...">
                <button class="audit" onclick="procesar()">AUDITAR</button>
            </div>
        </div>

        <div id="loader">Procesando factura...</div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nº Factura</th>
                        <th>Fecha</th>
                        <th>ID</th>
                        <th>Categoría</th>
                        <th class="right">Base</th>
                        <th class="right">IVA</th>
                        <th class="right">Total</th>
                        <th class="center">Acciones</th>
                    </tr>
                </thead>

                <tbody id="tbody"></tbody>
            </table>
        </div>

    </div>

    <script>
        const API = "http://localhost:5000";

        function txt(v) {
            return v === undefined || v === null ? "" : String(v);
        }

        function clean(v) {
            return txt(v).replace(/\n/g, " ").trim();
        }

        function esc(v) {
            return txt(v)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;");
        }

        function normalizarObjeto(obj) {
            return {
                numero_factura: clean(obj.numero_factura),
                fecha: clean(obj.fecha),
                id: clean(obj.id),
                categoria: clean(obj.categoria),
                base: clean(obj.base),
                iva: clean(obj.iva),
                total: clean(obj.total)
            };
        }

        function sonIguales(a, b) {
            return JSON.stringify(normalizarObjeto(a)) === JSON.stringify(normalizarObjeto(b));
        }

        async function procesar() {
            const input = document.getElementById("urlInput");
            const url = input.value.trim();

            if (!url) {
                alert("Introduce URL");
                return;
            }

            document.getElementById("loader").style.display = "block";

            try {
                const res = await fetch(`${API}/procesar`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        url_imagen: url
                    })
                });

                const data = await res.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                pintar(data, url);
                input.value = "";

            } catch (e) {
                alert(e.message);
            }

            document.getElementById("loader").style.display = "none";
        }

        function pintar(data, url) {
            const tr = document.createElement("tr");
            const original = normalizarObjeto(data);

            tr.dataset.url = url;
            tr.dataset.original = JSON.stringify(original);

            tr.innerHTML = `
                <td>
                    <div class="big numero" contenteditable="true">${esc(data.numero_factura)}</div>
                </td>

                <td>
                    <div class="big fecha" contenteditable="true">${esc(data.fecha)}</div>
                </td>

                <td>
                    <div class="big id" contenteditable="true">${esc(data.id)}</div>
                    ${data.needs_review ? '<div class="review">REVISAR</div>' : ''}
                </td>

                <td>
                    <div class="big categoria" contenteditable="true">${esc(data.categoria)}</div>
                </td>

                <td class="right">
                    <div class="money base" contenteditable="true">${esc(data.base)}</div>
                </td>

                <td class="right">
                    <div class="money iva" contenteditable="true">${esc(data.iva)}</div>
                </td>

                <td class="right">
                    <div class="money total" contenteditable="true">${esc(data.total)}</div>
                </td>

                <td class="center">
                    <div class="tools">
                        <a href="${esc(url)}" target="_blank" class="eye" title="Ver factura">👁</a>

                        <div class="actions">
                            <button class="ok" onclick="confirmar(this)">OK</button>
                            <button class="save" onclick="guardar(this)">Guardar</button>
                            <button class="delete" onclick="this.closest('tr').remove()">×</button>
                        </div>
                    </div>
                </td>
            `;

            document.getElementById("tbody").prepend(tr);
        }

        function leer(row) {
            return {
                numero_factura: clean(row.querySelector(".numero").innerText),
                fecha: clean(row.querySelector(".fecha").innerText),
                id: clean(row.querySelector(".id").innerText),
                categoria: clean(row.querySelector(".categoria").innerText),
                base: clean(row.querySelector(".base").innerText),
                iva: clean(row.querySelector(".iva").innerText),
                total: clean(row.querySelector(".total").innerText)
            };
        }

        async function confirmar(btn) {
            const row = btn.closest("tr");
            const original = JSON.parse(row.dataset.original || "{}");
            const actual = leer(row);

            if (sonIguales(original, actual)) {
                console.log("✅ OK sin cambios: no se guarda en memoria");
                btn.innerText = "OK";
                return;
            }

            await enviarCorreccion(btn, row, actual);
        }

        async function guardar(btn) {
            const row = btn.closest("tr");
            const original = JSON.parse(row.dataset.original || "{}");
            const actual = leer(row);

            if (sonIguales(original, actual)) {
                console.log("✅ Guardar sin cambios: no se guarda en memoria");
                btn.innerText = "Sin cambios";

                setTimeout(() => {
                    btn.innerText = "Guardar";
                }, 1200);

                return;
            }

            await enviarCorreccion(btn, row, actual);
        }

        async function enviarCorreccion(btn, row, actual) {
            btn.innerText = "...";

            try {
                const res = await fetch(`${API}/corregir`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        url: row.dataset.url,
                        correccion: actual
                    })
                });

                const data = await res.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                row.dataset.original = JSON.stringify(normalizarObjeto(actual));

                btn.innerText = "OK";

                setTimeout(() => {
                    btn.innerText = btn.classList.contains("save") ? "Guardar" : "OK";
                }, 1200);

            } catch (e) {
                alert(e.message);
                btn.innerText = "Error";
            }
        }
    </script>
</body>
</html>
